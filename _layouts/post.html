---
layout: default
---
<article class="post-layout">
  <header class="post-header">
    <p class="eyebrow">{% include thai-date.html date=page.date %}</p>
    <h1>{{ page.title }}</h1>
    {% if page.summary or page.description %}
      <p class="post-summary">{{ page.summary | default: page.description }}</p>
    {% endif %}
    {% if page.image %}
      <figure class="post-cover">
        <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" loading="lazy">
      </figure>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <p class="post-back">
    <a href="{{ '/' | relative_url }}">← กลับหน้าแรก</a>
  </p>
</article>
