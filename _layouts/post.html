---
layout: default
---
<article class="post-layout">
  <header class="post-header">
    <p class="eyebrow">{{ page.date | date: "%d %b %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="post-summary">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <p class="post-back">
    <a href="{{ '/' | relative_url }}">Back to all posts</a>
  </p>
</article>
