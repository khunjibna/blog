<!doctype html>
<html lang="{{ site.lang | default: 'th' }}">
  {% include head.html %}
  <body data-npub="{{ site.nostr.npub | default: '' }}">
    {% include topbar.html %}

    <div class="page-shell">
      {% if page.sidebar %}
        <div class="content-with-sidebar">
          <main class="site-main">
            {{ content }}
          </main>
          <aside class="site-sidebar">
            {% include sidebar.html %}
            {% include share-buttons.html %}
          </aside>
        </div>
      {% else %}
        <main class="site-main">
          {{ content }}
        </main>
      {% endif %}
    </div>

    {% include footer.html %}
  </body>
</html>
