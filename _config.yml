title: Sample Journal
description: A clean Jekyll starter blog with a custom layout.
url: ""
baseurl: "/blog"
lang: th
timezone: Asia/Bangkok
permalink: /:categories/:year/:month/:day/:title/

author:
  name: Napat
  bio: Frontend notes, experiments, and essays on building on the web.
  email: hello@example.com

navigation:
  - title: Home
    url: /
  - title: About
    url: /about/

markdown: kramdown
kramdown:
  input: GFM

collections:
  posts:
    output: true

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
